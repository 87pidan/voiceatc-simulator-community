name: Build Color Profiles Manifest

on:
  push:
    branches:
      - main
    paths:
      - "**/colors.json"
      - "**/style.json"
      - "tools/color_profiles_manifest.py"
      - "tests/test_color_profiles_manifest.py"
      - ".github/workflows/build-color-profiles-manifest.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Validate color profile files
        run: python tools/color_profiles_manifest.py --validate-only
